name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++ gcc libusb-1.0-0-dev
          pip3 install west pyelftools cryptography imgtool

      - name: Clone ZMK
        run: |
          git clone https://github.com/zmkfirmware/zmk.git

      - name: West init
        run: |
          cd zmk
          west init -l app
          west update

      - name: Build Keyboard
        run: |
          cd zmk
          west build -s app -b seeeduino_xiao_ble -- -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: zmk/build/zephyr/zmk.uf2
